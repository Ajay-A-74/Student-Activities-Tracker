<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDYVERSE</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<header>
<h1>STUDYVERSE</h1>
<p>Track your learning activities</p>
</header>
<section class="task-input">
<input type="text" id="tname" placeholder="Task Name">
<select id="tpri">
<option value="high">High Priority</option>
<option value="med">Medium Priority</option>
<option value="low">Low Priority</option>
</select>
<input type="number" id="thr" placeholder="Hours">
<input type="number" id="tmn" placeholder="Minutes">
<input type="date" id="tdue">
<button onclick="addTask()">Add Task</button>
</section>
<section class="tasks">
<h2>Active Tasks</h2>
<div id="tlist"></div>
<h2>Completed Tasks</h2>
<div id="dlist"></div>
</section>
<script src="script.js"></script>
</body>
</html>
